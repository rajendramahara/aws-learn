<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Court | Order Portal</title>

<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">

<style>
  body { max-width: 700px; }
</style>
</head>

<body class="container mt-4">

<h2>Food Court | Order Portal</h2>
<p>Select a combo or customize your meal</p>

<div class="text-center mb-3">
  <button class="btn btn-outline-secondary" onclick="showStandard()">
    Standard Combo
  </button>
</div>

<div class="text-center mb-3">
  <strong>or</strong><br><br>
  <button class="btn btn-outline-secondary" onclick="showCustom()">
    Custom Meal
  </button>
</div>

<!-- STANDARD -->
<div id="standardSection" class="card mb-3" style="display:none">
  <div class="card-header">Standard Combo</div>
  <div class="card-body">
    <select id="standardOrder" class="form-control">
      <option value="">Select</option>
      <option>VegCombo</option>
    </select>
  </div>
</div>

<!-- CUSTOM -->
<div id="customSection" class="card mb-3" style="display:none">
  <div class="card-header">Custom Meal (Max 5 Items)</div>
  <div class="card-body">
    <div id="ingredients"></div>
    <button class="btn btn-secondary mt-2" onclick="addIngredient()">
      + Add Item
    </button>
  </div>
</div>

<button class="btn btn-primary" onclick="placeOrder()">Place Order</button>

<pre id="result" class="mt-3"></pre>

<script>
const API_URL =
  "https://nm8oipxxye.execute-api.us-east-1.amazonaws.com/prod/order";

let mode = "";

const itemOptions = `
  <option value="">Select Item</option>
  <option value="BG">Burger Bun</option>
  <option value="PT">Patty</option>
  <option value="CH">Cheese</option>
  <option value="CH">Lettuce</option>
  <option value="CH">Tomato</option>
  <option value="CH">Fries</option>
`;

function showStandard() {
  mode = "standard";
  standardSection.style.display = "block";
  customSection.style.display = "none";
  ingredients.innerHTML = "";
}

function showCustom() {
  mode = "custom";
  customSection.style.display = "block";
  standardSection.style.display = "none";
  ingredients.innerHTML = "";
  addIngredient();
}

function addIngredient() {
  if (ingredients.children.length >= 5) {
    alert("Max 5 items allowed");
    return;
  }
  const row = document.createElement("div");
  row.className = "form-row mb-2";
  row.innerHTML = `
    <div class="col">
      <select class="form-control item">${itemOptions}</select>
    </div>
    <div class="col">
      <input type="number" min="1" value="1"
        class="form-control qty">
    </div>
  `;
  ingredients.appendChild(row);
}

function placeOrder() {
  let payload = {};

  if (mode === "standard") {
    const item = standardOrder.value;
    if (!item) return alert("Select combo");
    payload.order = item;

  } else if (mode === "custom") {
    payload.order = "Custom";
    payload.ingredients = [];

    document.querySelectorAll("#ingredients .form-row")
      .forEach(row => {
        const code = row.querySelector(".item").value;
        const qty = row.querySelector(".qty").value;
        if (code && qty > 0) {
          payload.ingredients.push({
            itemcode: code,
            quantity: Number(qty)
          });
        }
      });

    if (!payload.ingredients.length)
      return alert("Add at least one item");

  } else {
    return alert("Choose order type");
  }

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(d => result.innerText = JSON.stringify(d, null, 2))
  .catch(() => result.innerText = "Error placing order");
}
</script>

</body>
</html>
