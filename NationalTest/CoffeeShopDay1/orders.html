<!DOCTYPE html>
<html>
<head>
  <title>Orders</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; }
    .box { width:80%; margin:40px auto; background:white; padding:20px; }
    table { width:100%; border-collapse:collapse; }
    th,td { border:1px solid #ccc; padding:8px; text-align:center; }
    th { background:#6f4e37; color:white; }
  </style>
</head>

<body>
<div class="box">
<h2>Order Summary</h2>
<table>
  <thead>
    <tr>
      <th>Order ID</th>
      <th>Item</th>
      <th>Cost</th>
      <th>Timestamp</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>
</div>

<script>
const API_BASE = "https://xgyua7xzqk.execute-api.us-east-1.amazonaws.com/dev";

fetch(API_BASE + "/orders")
.then(r => r.json())
.then(data => {
  let rows = "";
  data.forEach(o => {
    rows += `<tr>
      <td>${o.orderid}</td>
      <td>${o.item}</td>
      <td>${o.cost}</td>
      <td>${o.timestamp}</td>
    </tr>`;
  });
  document.getElementById("data").innerHTML = rows;
});
</script>

</body>
</html>
