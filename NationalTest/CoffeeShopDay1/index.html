  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <title>Coffee Shop | Order Portal</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">

  <style>
    body { max-width: 700px; }
  </style>
  </head>

  <body class="container mt-4">

  <h2>Coffee Shop | Order Portal</h2>
  <p>Select a standard favourite or customize your own beverage!</p>

  <!-- BUTTONS -->
  <div>
      <div class="mb-3 text-center">
          <button class="btn btn-outline-secondary                                        "
                  onclick="showStandard()">
              Standard Beverages
          </button>
      </div>
      <div class="mb-3 text-center">
          <strong>or</strong><br><br>
          <button class="btn btn-outline-secondary"
              onclick="showCustom()">
              Customize Your Beverage
          </button>
      </div>
  </div>

  <!-- STANDARD SECTION -->
  <div id="standardSection" class="card mb-3" style="display:none">
    <div class="card-header">Standard Beverages</div>
    <div class="card-body">
      <select id="standardOrder" class="form-control">
        <option value="">Select</option>
        <option>Espresso</option>
        <option>Americano</option>
        <option>Flat White</option>
        <option>Doppio</option>
        <option>Macchiato</option>
        <option>Cappuccino</option>
        <option>Mocha</option>
        <option>Affogato</option>
        <option>Irish Coffee</option>
        <option>Iced Coffee</option>
      </select>
    </div>
  </div>

  <!-- CUSTOM SECTION -->
  <div id="customSection" class="card mb-3" style="display:none">
    <div class="card-header">
      Customize Your Beverage (Max 4 Ingredients)
    </div>
    <div class="card-body">
      <div id="ingredients"></div>

      <button class="btn btn-secondary mt-2"
          onclick="addIngredient()">
        + Add Ingredient
      </button>
    </div>
  </div>

  <!-- SUBMIT -->
  <button class="btn btn-primary"
      onclick="placeOrder()">
      Place Order
  </button>

  <pre id="result" class="mt-3"></pre>

  <script>
  const API_URL =
    "https://q7szffesdk.execute-api.us-east-1.amazonaws.com/prod/order";

  let mode = "";   // "standard" | "custom"

  const ingredientOptions = `
    <option value="">Select Ingredient</option>
    <option value="ES">Espresso</option>
    <option value="MK">Milk</option>
    <option value="SR">Sugar</option>
    <option value="FM">Foam Milk</option>
    <option value="CP">Chocolate Powder</option>
    <option value="WR">Water</option>
    <option value="IC">Ice</option>
  `;

  function showStandard() {
    mode = "standard";
    document.getElementById("standardSection").style.display = "block";
    document.getElementById("customSection").style.display = "none";
    document.getElementById("ingredients").innerHTML = "";
  }

  function showCustom() {
    mode = "custom";
    document.getElementById("customSection").style.display = "block";
    document.getElementById("standardSection").style.display = "none";
    document.getElementById("standardOrder").value = "";
    document.getElementById("ingredients").innerHTML = "";
    addIngredient();
  }

  function addIngredient() {
    const container = document.getElementById("ingredients");

    if (container.children.length >= 4) {
      alert("Maximum 4 ingredients allowed");
      return;
    }

    const row = document.createElement("div");
    row.className = "form-row mb-2";
    row.innerHTML = `
      <div class="col">
        <select class="form-control ingredient">
          ${ingredientOptions}
        </select>
      </div>
      <div class="col">
        <input type="number" min="1" value="1"
              class="form-control quantity">
      </div>
    `;
    container.appendChild(row);
  }

  function placeOrder() {
    let payload = {};

    if (mode === "standard") {
      const item = document.getElementById("standardOrder").value;
      if (!item) {
        alert("Please select a beverage");
        return;
      }
      payload.order = item;

    } else if (mode === "custom") {
      payload.order = "Custom";
      payload.ingredients = [];

      document.querySelectorAll("#ingredients .form-row")
        .forEach(row => {
          const code = row.querySelector(".ingredient").value;
          const qty = row.querySelector(".quantity").value;
          if (code && qty > 0) {
            payload.ingredients.push({
              item: code,
              quantity: Number(qty)
            });
          }
        });

      if (payload.ingredients.length === 0) {
        alert("Add at least one ingredient");
        return;
      }

    } else {
      alert("Please choose Standard or Customize");
      return;
    }

    fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
      document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
    })
    .catch(() => {
      document.getElementById("result").innerText =
        "Error placing order";
    });
  }
  </script>

  </body>
  </html>
