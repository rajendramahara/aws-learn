<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Galactic Wildlife - Analytics</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa") no-repeat center center fixed;
      background-size: cover;
      color: #fff;
    }

    .container {
      background: rgba(0, 0, 0, 0.65);
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
      border-bottom: 2px solid #fff;
      padding-bottom: 10px;
    }

    .btn {
      padding: 12px 20px;
      background: #ffcc00;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .btn:hover {
      background: #e6b800;
    }

    .card {
      border: 1px solid #bbb;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Wildlife Analytics</h1>

  <button class="btn" onclick="window.location.href='index.html'">⬅ Back to Home</button>

  <div id="summary" style="margin-top:20px;">Loading analytics...</div>

  <h2 style="margin-top:20px;">Latest Sightings</h2>
  <div id="latest"></div>

</div>

<script>
// API URL (CHANGE THIS)
const API_BASE = "https://0qi7pimu0l.execute-api.us-east-1.amazonaws.com/prod";
const ANALYTICS_URL = API_BASE + "/analytics";

// Load analytics data
async function loadData() {
  const summaryDiv = document.getElementById("summary");
  const latestDiv = document.getElementById("latest");

  try {
    const response = await fetch(ANALYTICS_URL);
    const data = await response.json();

    if (!response.ok) {
      summaryDiv.textContent = "Error: " + JSON.stringify(data);
      return;
    }

    // Summary
    summaryDiv.innerHTML = `
      <p><strong>Total Submissions:</strong> ${data.total_submissions}</p>
      <h3>Species Summary</h3>
      <ul>
        ${Object.entries(data.per_species).map(([k,v]) => `<li>${k}: ${v}</li>`).join("")}
      </ul>
    `;

    // Latest sighting cards
    latestDiv.innerHTML = data.latest.map(item => `
      <div class="card">
        <strong>${item.timestamp}</strong><br>
        Ranger: ${item.ranger} (${item.planet})<br>
        Species: ${Object.entries(item.sightings).map(([k,v]) => `${k}: ${v}`).join(", ")}
      </div>
    `).join("");

  } catch (err) {
    summaryDiv.textContent = "Network Error: " + err;
  }
}

// Load immediately + refresh every 10s
loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
