<!DOCTYPE html>
<html>
<head>
  <title>User Registration</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; margin: 50px; }
    form { max-width: 300px; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin-top: 5px; }
    button { margin-top: 15px; padding: 10px; width: 100%; background: #0073e6; color: white; border: none; cursor: pointer; }
    button:hover { background: #005bb5; }
    #response { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>User Registration</h2>
  <form id="userForm">
    <label>Username:</label>
    <input type="text" id="username" required>
    <label>Email:</label>
    <input type="email" id="email" required>
    <button type="submit">Submit</button>
  </form>
  <p id="response"></p>

  <script>
    document.getElementById("userForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;

      try {
        const res = await fetch("https://w5a3by6m5c.execute-api.us-east-1.amazonaws.com/dev/users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email }),
        });

        const text = await res.text();   // get raw text
        console.log("Raw response:", text);

        let data;
        try {
          data = JSON.parse(text);
        } catch (err) {
          document.getElementById("response").innerText = "Error: Server did not return JSON.\n" + text;
          return;
        }

        document.getElementById("response").innerText =
          data.message + " ✅ ID: " + (data.user?.id || "N/A");
      } catch (err) {
        document.getElementById("response").innerText = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
